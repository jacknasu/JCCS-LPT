<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>JCCS LPT Investment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#EFF6FF;color:#1E293B;min-height:100vh;}
:root{
  --blue:#1D4ED8;--navy:#1E3A8A;--lightblue:#DBEAFE;--bg:#EFF6FF;
  --white:#fff;--border:#BFDBFE;--red:#DC2626;--green:#16A34A;
  --text:#1E293B;--sub:#475569;--muted:#94A3B8;
}
/* ── UTILS ── */
.hidden{display:none!important;}
.flex{display:flex;} .flex-col{flex-direction:column;} .items-center{align-items:center;}
.justify-between{justify-content:space-between;} .justify-center{justify-content:center;}
.gap-8{gap:8px;} .gap-12{gap:12px;} .gap-16{gap:16px;}
.w100{width:100%;} .text-center{text-align:center;}
/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--navy);box-shadow:0 4px 14px #1D4ED844;}
.btn-out{background:#fff;color:var(--blue);border:2px solid var(--border);}
.btn-out:hover{background:var(--lightblue);}
.btn-red{background:#fff;color:var(--red);border:2px solid #FECACA;padding:8px 14px;font-size:13px;}
.btn-red:hover{background:#FEF2F2;}
.btn-sm{padding:8px 14px;font-size:13px;}
/* ── INPUTS ── */
.inp{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:.2s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px #BFDBFE;}
label.lbl{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.8px;margin-bottom:5px;display:block;text-transform:uppercase;}
/* ── CARDS ── */
.card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 2px 12px #1D4ED80D;}
.card-top-blue{border-top:3px solid var(--blue);}
.card-top-green{border-top:3px solid var(--green);}
.card-top-red{border-top:3px solid var(--red);}
/* ── LAYOUT ── */
#app{min-height:100vh;}
/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1E3A8A 0%,#1D4ED8 60%,#2563EB 100%);}
.login-box{background:#fff;border-radius:22px;padding:44px 36px;width:100%;max-width:420px;box-shadow:0 24px 64px #1E3A8A44;}
.tab-row{display:flex;background:#EFF6FF;border-radius:11px;padding:4px;border:2px solid #DBEAFE;margin-bottom:24px;}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:9px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;transition:.2s;background:transparent;color:#94A3B8;}
.tab-btn.active{background:var(--blue);color:#fff;}
.brand-row{text-align:center;margin-bottom:28px;}
.brand-row img{width:64px;height:64px;border-radius:10px;object-fit:cover;}
.brand-name{font-size:22px;font-weight:800;color:var(--navy);margin-top:8px;}
.brand-sub{font-size:11px;font-weight:700;color:var(--red);letter-spacing:2px;text-transform:uppercase;}
.otp-row{display:flex;gap:10px;}
.otp-row input{flex:1;text-align:center;font-size:24px;font-weight:700;letter-spacing:4px;padding:14px 0;}
.hint-box{margin-top:18px;background:#EFF6FF;border-radius:9px;padding:10px 14px;font-size:12px;color:#94A3B8;text-align:center;border:1px solid #DBEAFE;}
.hint-box b{color:var(--blue);}
.err-msg{color:var(--red);font-size:13px;background:#FEF2F2;padding:9px 13px;border-radius:8px;border:1px solid #FECACA;display:none;}
.err-msg.show{display:block;}
/* ── ADMIN LAYOUT ── */
#adminScreen{display:flex;min-height:100vh;}
.sidebar{width:240px;background:linear-gradient(180deg,#1E3A8A,#1D4ED8);display:flex;flex-direction:column;padding:24px 14px;box-shadow:4px 0 20px #1E3A8A33;flex-shrink:0;}
.sidebar-brand{margin-bottom:32px;padding-left:4px;display:flex;align-items:center;gap:10px;}
.sidebar-brand img{width:40px;height:40px;border-radius:8px;object-fit:cover;}
.sidebar-brand .sbn{font-size:16px;font-weight:800;color:#fff;line-height:1.1;}
.sidebar-brand .sbs{font-size:10px;font-weight:700;color:#FCA5A5;letter-spacing:2px;text-transform:uppercase;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;transition:.2s;margin-bottom:4px;}
.nav-btn.active{background:#2563EB;color:#fff;}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.1);color:#fff;}
.nav-btn .icon{font-size:18px;}
.sidebar-footer{margin-top:auto;}
.main-content{flex:1;overflow:auto;padding:32px;}
/* ── HEADER ── */
.portal-header{background:linear-gradient(90deg,#1E3A8A,#1D4ED8);padding:0 28px;box-shadow:0 4px 16px #1E3A8A44;}
.portal-header-top{display:flex;justify-content:space-between;align-items:center;height:64px;}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-brand img{width:38px;height:38px;border-radius:8px;object-fit:cover;}
.header-brand .hbn{font-size:15px;font-weight:800;color:#fff;}
.header-brand .hbs{font-size:10px;font-weight:700;color:#FCA5A5;letter-spacing:2px;text-transform:uppercase;}
.header-user{text-align:right;}
.header-user .hun{font-size:14px;font-weight:700;color:#fff;}
.header-user .hua{font-size:11px;color:#93C5FD;}
.tab-nav{display:flex;}
.tab-nav button{background:transparent;border:none;border-bottom:3px solid transparent;padding:12px 22px;color:rgba(255,255,255,.55);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:.2s;}
.tab-nav button.active{color:#fff;border-bottom-color:#fff;}
/* ── DASHBOARD STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#fff;border:2px solid var(--border);border-radius:14px;padding:20px;text-align:center;box-shadow:0 2px 8px #1D4ED80D;}
.stat-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;}
.stat-val{font-size:22px;font-weight:800;margin-bottom:4px;}
.stat-lbl{font-size:12px;color:var(--muted);font-weight:600;}
/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:10px 12px;color:var(--sub);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#F8FAFF;}
.tbl td{padding:12px;border-bottom:1px solid #DBEAFE;font-size:14px;}
.tbl tr:hover td{background:#F8FAFF;}
/* ── CUSTOMER CARDS ── */
.cust-card{background:#fff;border:2px solid #DBEAFE;border-radius:14px;padding:18px;cursor:pointer;transition:.2s;margin-bottom:12px;}
.cust-card:hover,.cust-card.open{border-color:var(--blue);box-shadow:0 4px 16px #1D4ED822;}
.cust-detail{margin-top:16px;border-top:2px solid #DBEAFE;padding-top:16px;display:none;}
.cust-card.open .cust-detail{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.detail-item{background:#EFF6FF;border-radius:10px;padding:10px 13px;}
.detail-item .di-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:3px;}
.detail-item .di-v{font-size:14px;font-weight:700;}
/* ── SECTION TABLES ── */
.sec-tbl{border-radius:12px;padding:14px;}
.sec-tbl .sec-lbl{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.sec-tbl .sec-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.sec-tbl .sec-total{display:flex;justify-content:space-between;font-weight:800;font-size:13px;padding-top:8px;margin-top:8px;}
/* ── BROCHURE CARDS ── */
.broch-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.broch-card{background:#fff;border:2px solid #DBEAFE;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px #1D4ED80D;}
.broch-img{width:100%;height:180px;object-fit:cover;display:block;}
.broch-banner{background:linear-gradient(135deg,#1E3A8A,#2563EB);height:88px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.broch-banner-title{font-size:18px;font-weight:800;color:#fff;}
.broch-tag{background:var(--blue);color:#fff;font-size:11px;font-weight:700;border-radius:7px;padding:4px 11px;}
.broch-tag-white{background:#fff;color:var(--blue);}
.broch-body{padding:16px 18px 18px;}
.broch-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.broch-info-item{background:#EFF6FF;border-radius:8px;padding:9px 10px;border:1.5px solid #DBEAFE;}
.broch-info-item .bi-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;}
.broch-info-item .bi-v{font-size:13px;font-weight:700;color:var(--blue);margin-top:2px;}
.profit-box{background:#EFF6FF;border-radius:9px;padding:12px 14px;border-left:3px solid var(--blue);margin-bottom:14px;}
.profit-box .pb-l{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1px;margin-bottom:4px;}
.profit-box .pb-v{font-size:13px;color:var(--text);}
/* ── FORM PANEL ── */
.form-panel{width:380px;background:#fff;border:2px solid #DBEAFE;border-radius:18px;padding:26px;position:sticky;top:0;max-height:96vh;overflow-y:auto;box-shadow:0 8px 40px #1D4ED81A;flex-shrink:0;}
.form-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:20px;}
.form-section{margin-bottom:6px;}
.form-row{display:flex;gap:6px;margin-bottom:7px;}
/* ── IMG UPLOAD ── */
.img-upload-area{border:2px dashed #93C5FD;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;background:#EFF6FF;transition:.2s;}
.img-upload-area:hover{border-color:var(--blue);background:#DBEAFE;}
.img-preview-wrap{position:relative;border-radius:12px;overflow:hidden;border:2px solid #DBEAFE;}
.img-preview-wrap img{width:100%;height:160px;object-fit:cover;display:block;}
.img-del-btn{position:absolute;top:8px;right:8px;background:#DC2626;border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.img-change-btn{position:absolute;bottom:8px;right:8px;background:var(--blue);border:none;border-radius:8px;color:#fff;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
/* ── PORTAL (user) ── */
#portalScreen{min-height:100vh;background:#EFF6FF;}
.portal-main{padding:28px;max-width:900px;margin:0 auto;}
.welcome-card{background:linear-gradient(135deg,#1E3A8A,#2563EB);border-radius:18px;padding:26px 28px;margin-bottom:20px;box-shadow:0 8px 28px #1E3A8A44;color:#fff;}
.wc-name{font-size:26px;font-weight:800;}
.wc-sub{font-size:13px;color:#93C5FD;margin-top:4px;}
.wc-net{font-size:38px;font-weight:800;color:#4ADE80;}
.wc-net-lbl{font-size:12px;color:#93C5FD;}
.info-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.info-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.info-assets-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.asset-card{background:#fff;border:2px solid #DBEAFE;border-radius:14px;padding:20px;}
.ac-row{display:flex;justify-content:space-between;margin-bottom:10px;padding:8px 0;border-bottom:1px solid #DBEAFE;font-size:14px;}
.ac-total{display:flex;justify-content:space-between;font-weight:800;padding-top:10px;}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;display:none;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:18px;padding:30px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:20px;}
/* ── CHANGE PASSWORD ── */
.admin-actions-bar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:20px;}
/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{width:60px;padding:16px 8px;}
  .sidebar-brand .sbn,.sidebar-brand .sbs,.nav-btn span:last-child{display:none;}
  .sidebar-brand{justify-content:center;}
  .nav-btn{justify-content:center;padding:12px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .broch-grid{grid-template-columns:1fr;}
  .info-grid3{grid-template-columns:1fr;}
  .info-assets-grid{grid-template-columns:1fr;}
  .form-panel{width:100%;position:relative;}
  .main-content{padding:16px;}
  .portal-main{padding:16px;}
}
</style>
</head>

let currentSession = null;
let pendingOtp = null;
let pendingUserId = null;
let currentTab = 'admin';

function inr(n){ return '₹' + Number(n).toLocaleString('en-IN',{maximumFractionDigits:0}); }

function switchTab(tab){
  currentTab = tab;
  document.getElementById('adminLoginForm').classList.toggle('hidden', tab!=='admin');
  document.getElementById('userLoginForm').classList.toggle('hidden', tab!=='user');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(tab==='admin'&&i===0)||(tab==='user'&&i===1));
  });
  hideErr('adminErr'); hideErr('userErr');
}

function showErr(id,msg){ const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }
function hideErr(id){ document.getElementById(id).classList.remove('show'); }

function doAdminLogin(){
  const u=document.getElementById('adminUser').value.trim();
  const p=document.getElementById('adminPass').value;
  const admin=DB.get('admin');
  if(u===admin.username && p===admin.password){
    currentSession={role:'admin'};
    show('adminScreen'); hide('loginScreen');
    adminNav('dashboard');
  } else { showErr('adminErr','Invalid credentials.'); }
}

async function doUserLogin(){
  const acc = document.getElementById('userAcc').value.trim();
  if(!acc){ showErr('userErr','Please enter your account number or mobile.'); return; }
  const customers = DB.get('customers')||[];
  const cust = customers.find(c => c.accountNumber===acc || c.mobile===acc);
  if(!cust){ showErr('userErr','Account not found. Please contact admin.'); return; }

  pendingOtp = String(Math.floor(100000 + Math.random()*900000));
  pendingUserId = cust.id;

  const cfg = DB.get('smsconfig')||{};
  const apiKey = (cfg.apikey||'').trim();
  const mobile = cust.mobile.replace(/[^0-9]/g,'').slice(-10);

  const btn = document.getElementById('userLoginBtn');
  btn.textContent = 'Sending OTP…';
  btn.disabled = true;

  if(apiKey){
    const sent = await sendFast2SMS(apiKey, mobile, pendingOtp);
    btn.textContent = 'Send OTP →';
    btn.disabled = false;
    if(sent){
      document.getElementById('demoOtpWrap').style.display = 'block';
      document.getElementById('demoOtpShow').textContent = '';
      document.getElementById('otpSection').classList.remove('hidden');
      document.getElementById('userLoginBtn').classList.add('hidden');
      document.getElementById('verifyOtpBtn').classList.remove('hidden');
      hideErr('userErr');
    } else {
      showErr('userErr','SMS failed. Check API key in Settings or try demo mode.');
      fallbackOtp();
    }
  } else {
    btn.textContent = 'Send OTP →';
    btn.disabled = false;
    fallbackOtp();
  }
}

async function sendFast2SMS(apiKey, mobile, otp){
  try {
    const msg = encodeURIComponent('Your JCCS LPT Investment OTP is ' + otp + '. Valid for 10 minutes. Do not share.');
    // Fast2SMS Quick SMS endpoint
    const url = 'https://www.fast2sms.com/dev/bulkV2?authorization=' + encodeURIComponent(apiKey) +
      '&route=q&message=' + msg + '&language=english&flash=0&numbers=' + mobile;
    const res = await fetch(url, { method:'GET', headers:{'cache-control':'no-cache'} });
    const data = await res.json();
    return data.return === true;
  } catch(e){ return false; }
}

function fallbackOtp(){
  // Demo mode — show OTP on screen
  document.getElementById('demoOtpWrap').style.display = 'block';
  document.getElementById('demoOtpShow').textContent = '(Demo OTP: ' + pendingOtp + ')';
  document.getElementById('otpSection').classList.remove('hidden');
  document.getElementById('userLoginBtn').classList.add('hidden');
  document.getElementById('verifyOtpBtn').classList.remove('hidden');
  hideErr('userErr');
}

function verifyOtp(){
  const entered = document.getElementById('otpInput').value.trim();
  if(entered.length < 6){ showErr('userErr','Please enter the 6-digit OTP.'); return; }
  if(entered === pendingOtp){
    const customers = DB.get('customers')||[];
    const cust = customers.find(c => c.id===pendingUserId);
    currentSession = {role:'user', customerId:pendingUserId};
    document.getElementById('portalUserName').textContent = cust.name;
    document.getElementById('portalUserAcc').textContent = cust.accountNumber;
    show('portalScreen'); hide('loginScreen');
    portalTab('myinv');
  } else {
    showErr('userErr','Wrong OTP. Please check and try again.');
  }
}

function logout(){
  currentSession=null; pendingOtp=null; pendingUserId=null;
  hide('adminScreen'); hide('portalScreen');
  show('loginScreen');
  document.getElementById('adminUser').value='';
  document.getElementById('adminPass').value='';
  document.getElementById('userAcc').value='';
  document.getElementById('otpInput').value='';
  document.getElementById('otpSection').classList.add('hidden');
  document.getElementById('userLoginBtn').classList.remove('hidden');
  document.getElementById('verifyOtpBtn').classList.add('hidden');
  switchTab('admin');
}

function addAssetRow(){
  const rows=document.getElementById('assetRows');
  const i=Date.now();
  rows.insertAdjacentHTML('beforeend',`<div class="form-row" id="ar${i}">
    <input class="inp" placeholder="Label" id="al${i}" style="flex:2;"/>

function removeAssetRow(i){ const el=document.getElementById('ar'+i); if(el) el.remove(); }

function saveCust(){
  const name=document.getElementById('cfName').value.trim();
  const acc=document.getElementById('cfAcc').value.trim();
  if(!name||!acc){ alert('Name and Account Number required.'); return; }
  const rows=document.querySelectorAll('#assetRows .form-row');
  const assets=[];
  rows.forEach(row=>{
    const label=row.querySelector('[id^="al"]')?.value?.trim();
    const value=parseFloat(row.querySelector('[id^="av"]')?.value)||0;
    if(label) assets.push({label,value});
  });
  const customers=DB.get('customers')||[];
  const entry={
    id:editCustId||Date.now(),
    accountNumber:acc,
    depositAccountNumber:document.getElementById('cfDep').value.trim(),
    name,
    mobile:document.getElementById('cfMob').value.trim(),
    investmentAmount:parseFloat(document.getElementById('cfAmt').value)||0,
    lockingPeriod:document.getElementById('cfLock').value.trim(),
    maturedPeriod:document.getElementById('cfMat').value.trim(),
    assets
  };
  if(editCustId){ const idx=customers.findIndex(c=>c.id===editCustId); customers[idx]=entry; }
  else customers.push(entry);
  DB.set('customers',customers);
  custFormOpen=false; editCustId=null;
  adminNav('customers');
}
function closeCustForm(){ custFormOpen=false; editCustId=null; adminNav('customers'); }
function deleteCust(id){
  if(!confirm('Delete this customer?')) return;
  const customers=DB.get('customers')||[];
  DB.set('customers',customers.filter(c=>c.id!==id));
  adminNav('customers');
}

  reader.readAsDataURL(file);
}
function clearBrochImg(){ brochImgData=null; document.getElementById('brochFormWrap').innerHTML=renderBrochForm(); }

function saveBroch(){
  const scheme=document.getElementById('bfScheme').value.trim();
  if(!scheme){ alert('Scheme name required.'); return; }
  const brochures=DB.get('brochures')||[];
  const entry={
    id:editBrochId||Date.now(),
    scheme,
    duration:document.getElementById('bfDur').value.trim(),
    interestRate:document.getElementById('bfInt').value.trim(),
    minAmount:document.getElementById('bfMin').value.trim(),
    tag:document.getElementById('bfTag').value.trim(),
    description:document.getElementById('bfDesc').value.trim(),
    profitDeclaration:document.getElementById('bfProfit').value.trim(),
    image:brochImgData
  };
  if(editBrochId){ const idx=brochures.findIndex(b=>b.id===editBrochId); brochures[idx]=entry; }
  else brochures.push(entry);
  DB.set('brochures',brochures);
  brochFormOpen=false; editBrochId=null; brochImgData=null;
  adminNav('brochures');
}
function closeBrochForm(){ brochFormOpen=false; editBrochId=null; brochImgData=null; adminNav('brochures'); }
function deleteBroch(id){
  if(!confirm('Delete this brochure?')) return;
  const brochures=DB.get('brochures')||[];
  DB.set('brochures',brochures.filter(b=>b.id!==id));
  adminNav('brochures');
}

// INVESTMENTS (Admin only — outside investments + profit)
// ════════════════════════════════════════════════════════
let invFormOpen=false, editInvId=null;

function renderInvestments(){
  const investments=DB.get('investments')||[];
  const totalOut=investments.reduce((s,i)=>s+i.investedAmount,0);
  const totalProfit=investments.reduce((s,i)=>s+i.profitLoss,0);
  return `
  <div style="display:flex;gap:24px;align-items:flex-start;">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h1 style="font-size:24px;font-weight:800;color:#1E3A8A;">Outside Investments & Profit</h1>
        <button class="btn btn-blue btn-sm" onclick="openInvForm()">+ Add Investment</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
        <div class="stat-card card-top-green">
          <div class="stat-icon" style="background:#DCFCE7;">📤</div>
          <div class="stat-val" style="color:#16A34A;">${inr(totalOut)}</div>
          <div class="stat-lbl">Total Invested Outside</div>
        </div>
        <div class="stat-card" style="border-top:3px solid #7C3AED;">
          <div class="stat-icon" style="background:#EDE9FE;">💰</div>
          <div class="stat-val" style="color:#7C3AED;">${inr(totalProfit)}</div>
          <div class="stat-lbl">Total Profit Earned</div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:16px;font-weight:800;color:#1E3A8A;margin-bottom:16px;border-bottom:2px solid #EFF6FF;padding-bottom:10px;">Investment Records</h3>
        ${investments.map(inv=>`
        <div style="border:2px solid #DBEAFE;border-radius:12px;padding:16px 18px;margin-bottom:12px;background:#FAFCFF;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div>
              <div style="font-weight:800;font-size:16px;">${inv.title}</div>
              <div style="color:#64748B;font-size:13px;margin-top:2px;">${inv.date} · ${inv.notes}</div>
            </div>
            <div style="text-align:right;">
              <div style="color:#16A34A;font-weight:800;font-size:18px;">+${inr(inv.profitLoss)}</div>
              <div style="color:#94A3B8;font-size:12px;">Profit</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;">
            <div style="background:#EFF6FF;border-radius:8px;padding:10px 12px;border:1px solid #DBEAFE;">
              <div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:1px;">INVESTED</div>
              <div style="color:#1D4ED8;font-weight:700;font-size:14px;margin-top:2px;">${inr(inv.investedAmount)}</div>
            </div>
            <div style="background:#EFF6FF;border-radius:8px;padding:10px 12px;border:1px solid #DBEAFE;">
              <div style="font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:1px;">CURRENT VALUE</div>
              <div style="color:#0284C7;font-weight:700;font-size:14px;margin-top:2px;">${inr(inv.currentValue)}</div>
            </div>
            <div style="background:#F0FDF4;border-radius:8px;padding:10px 12px;border:1px solid #16A34A33;">
              <div style="font-size:10px;font-weight:700;color:#16A34A;letter-spacing:1px;">PROFIT/LOSS</div>
              <div style="color:#16A34A;font-weight:700;font-size:14px;margin-top:2px;">+${inr(inv.profitLoss)}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn btn-out btn-sm" onclick="openInvForm(${inv.id})">✎ Edit</button>
            <button class="btn btn-red" onclick="deleteInv(${inv.id})">✕ Delete</button>
          </div>
        </div>`).join('')}
        ${investments.length===0?'<div style="text-align:center;color:#94A3B8;padding:40px;">No investment records yet.</div>':''}
      </div>
    </div>
    <div id="invFormWrap">${invFormOpen?renderInvForm():''}</div>
  </div>`;
}

function openInvForm(id=null){
  invFormOpen=true; editInvId=id;
  adminNav('investments');
  setTimeout(()=>{ const w=document.getElementById('invFormWrap'); if(w) w.innerHTML=renderInvForm(); },10);
}

function renderInvForm(){
  const investments=DB.get('investments')||[];
  const inv=editInvId?investments.find(x=>x.id===editInvId):null;
  return `<div class="form-panel">
    <div class="form-title">${editInvId?'Edit Investment':'New Investment'}</div>
    <div style="display:flex;flex-direction:column;gap:13px;">
      ${[['ifTitle','Investment Title',inv?.title||''],['ifAmt','Amount Invested (₹)',inv?.investedAmount||''],['ifCur','Current Value (₹)',inv?.currentValue||''],['ifProfit','Profit / Loss (₹)',inv?.profitLoss||''],['ifDate','Date (YYYY-MM-DD)',inv?.date||''],['ifNotes','Notes',inv?.notes||'']].map(([id,lbl,val])=>`
      <div><label class="lbl">${lbl}</label><input class="inp" id="${id}" value="${val}"/></div>`).join('')}
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn btn-blue" style="flex:1;" onclick="saveInv()">Save</button>
        <button class="btn btn-out" style="flex:1;" onclick="closeInvForm()">Cancel</button>
      </div>
    </div>
  </div>`;
}

function saveInv(){
  const title=document.getElementById('ifTitle').value.trim();
  if(!title){ alert('Title required.'); return; }
  const investments=DB.get('investments')||[];
  const entry={
    id:editInvId||Date.now(),
    title,
    investedAmount:parseFloat(document.getElementById('ifAmt').value)||0,
    currentValue:parseFloat(document.getElementById('ifCur').value)||0,
    profitLoss:parseFloat(document.getElementById('ifProfit').value)||0,
    date:document.getElementById('ifDate').value.trim(),
    notes:document.getElementById('ifNotes').value.trim()
  };
  if(editInvId){ const idx=investments.findIndex(i=>i.id===editInvId); investments[idx]=entry; }
  else investments.push(entry);
  DB.set('investments',investments);
  invFormOpen=false; editInvId=null;
  adminNav('investments');
}
function closeInvForm(){ invFormOpen=false; editInvId=null; adminNav('investments'); }
function deleteInv(id){
  if(!confirm('Delete this investment record?')) return;
  const investments=DB.get('investments')||[];
  DB.set('investments',investments.filter(i=>i.id!==id));
  adminNav('investments');
}

function renderSettings(){
  const cfg = DB.get('smsconfig')||{};
  return `
  <h1 style="font-size:24px;font-weight:800;color:#1E3A8A;margin-bottom:24px;">Settings</h1>
  <div style="max-width:480px;display:flex;flex-direction:column;gap:20px;">

    <!-- SMS CONFIG -->
    <div class="card card-top-blue">
      <h3 style="font-size:17px;font-weight:800;color:#1E3A8A;margin-bottom:6px;">📱 SMS / OTP Configuration</h3>
      <p style="font-size:13px;color:#64748B;margin-bottom:18px;">Configure Fast2SMS to send real OTPs to customers. Without API key, OTP is shown on screen (demo mode).</p>
      <div style="display:flex;flex-direction:column;gap:13px;">
        <div>
          <label class="lbl">Fast2SMS API Key</label>
          <input class="inp" id="sApiKey" placeholder="Paste your Fast2SMS API key here" value="${cfg.apikey||''}"/>
          <div style="font-size:11px;color:#94A3B8;margin-top:4px;">Get free key at <b style="color:#1D4ED8;">fast2sms.com</b> → Sign up → API</div>
        </div>
        <div>
          <label class="lbl">Sender ID (6 chars)</label>
          <input class="inp" id="sSenderId" placeholder="e.g. JCCLPT" value="${cfg.senderid||'JCCLPT'}" maxlength="6"/>
        </div>
        <div style="background:#EFF6FF;border-radius:10px;padding:14px;border:1px solid #BFDBFE;">
          <div style="font-size:12px;font-weight:700;color:#1D4ED8;margin-bottom:8px;">How to get Fast2SMS API key (Free):</div>
          <ol style="font-size:12px;color:#475569;padding-left:18px;line-height:2;">
            <li>Go to <b>fast2sms.com</b> and sign up</li>
            <li>Verify your mobile number</li>
            <li>Go to <b>Dev API</b> section</li>
            <li>Copy your API key and paste above</li>
            <li>Free plan gives 200 SMS credits</li>
          </ol>
        </div>
        <div class="err-msg" id="smsErr"></div>
        <div style="color:#16A34A;font-size:13px;background:#F0FDF4;padding:9px 13px;border-radius:8px;border:1px solid #16A34A33;display:none;" id="smsOk">✅ SMS settings saved!</div>
        <button class="btn btn-blue" onclick="saveSmsConfig()">Save SMS Settings</button>
      </div>
    </div>

    <!-- CHANGE CREDENTIALS -->
    <div class="card card-top-blue">
      <h3 style="font-size:17px;font-weight:800;color:#1E3A8A;margin-bottom:20px;">🔐 Change Admin Credentials</h3>
      <div style="display:flex;flex-direction:column;gap:13px;">
        <div><label class="lbl">Current Password</label><input class="inp" type="password" id="sCurPass" placeholder="Current password"/></div>
        <div><label class="lbl">New Username</label><input class="inp" id="sNewUser" placeholder="New username"/></div>
        <div><label class="lbl">New Password</label><input class="inp" type="password" id="sNewPass" placeholder="New password (min 6 chars)"/></div>
        <div><label class="lbl">Confirm New Password</label><input class="inp" type="password" id="sConfPass" placeholder="Confirm new password"/></div>
        <div class="err-msg" id="settingsErr"></div>
        <div style="color:#16A34A;font-size:13px;background:#F0FDF4;padding:9px 13px;border-radius:8px;border:1px solid #16A34A33;display:none;" id="settingsOk">✅ Credentials updated!</div>
        <button class="btn btn-blue" onclick="saveSettings()">Update Credentials</button>
      </div>
    </div>

    <!-- TEST SMS -->
    <div class="card" style="border-color:#FED7AA;background:#FFF7ED;">
      <h3 style="font-size:15px;font-weight:800;color:#9A3412;margin-bottom:10px;">🧪 Test SMS</h3>
      <div style="display:flex;gap:10px;">
        <input class="inp" id="testMobile" placeholder="Enter 10-digit mobile to test" maxlength="10"/>
        <button class="btn btn-blue btn-sm" style="white-space:nowrap;" onclick="testSms()">Send Test</button>
      </div>
      <div style="font-size:12px;color:#92400E;margin-top:8px;">Sends a test OTP to verify your API key works.</div>
      <div id="testSmsResult" style="margin-top:8px;font-size:13px;display:none;"></div>
    </div>

  </div>`;
}

function saveSettings(){
  const admin = DB.get('admin');
  const cur = document.getElementById('sCurPass').value;
  const newU = document.getElementById('sNewUser').value.trim();
  const newP = document.getElementById('sNewPass').value;
  const conf = document.getElementById('sConfPass').value;
  const errEl = document.getElementById('settingsErr');
  const okEl = document.getElementById('settingsOk');
  errEl.classList.remove('show'); okEl.style.display='none';
  if(cur!==admin.password){ errEl.textContent='Current password incorrect.'; errEl.classList.add('show'); return; }
  if(!newU){ errEl.textContent='New username required.'; errEl.classList.add('show'); return; }
  if(newP.length<6){ errEl.textContent='Password must be at least 6 characters.'; errEl.classList.add('show'); return; }
  if(newP!==conf){ errEl.textContent='Passwords do not match.'; errEl.classList.add('show'); return; }
  DB.set('admin',{username:newU,password:newP});
  okEl.style.display='block';
  setTimeout(()=>{ const el=document.getElementById('settingsOk'); if(el) el.style.display='none'; },3000);
}

let portalCurrentTab='myinv';

function portalTab(tab){
  portalCurrentTab=tab;
  ['myinv','schemes'].forEach(t=>{
    const btn=document.getElementById('ptab-'+t);
    if(btn) btn.classList.toggle('active',t===tab);
  });
  renderPortal();
}

function renderPortal(){
  const customers=DB.get('customers')||[];
  const cust=customers.find(c=>c.id===currentSession.customerId);
  if(!cust){ document.getElementById('portalMain').innerHTML='<div style="padding:40px;text-align:center;color:#94A3B8;">Customer data not found.</div>'; return; }
  if(portalCurrentTab==='myinv') document.getElementById('portalMain').innerHTML=renderMyInv(cust);
  else document.getElementById('portalMain').innerHTML=renderSchemes();
}
