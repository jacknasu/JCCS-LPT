<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>JCCS LPT Investment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#EFF6FF;color:#1E293B;min-height:100vh;}
:root{
  --blue:#1D4ED8;--navy:#1E3A8A;--lightblue:#DBEAFE;--bg:#EFF6FF;
  --white:#fff;--border:#BFDBFE;--red:#DC2626;--green:#16A34A;
  --text:#1E293B;--sub:#475569;--muted:#94A3B8;
}
/* ── UTILS ── */
.hidden{display:none!important;}
.flex{display:flex;} .flex-col{flex-direction:column;} .items-center{align-items:center;}
.justify-between{justify-content:space-between;} .justify-center{justify-content:center;}
.gap-8{gap:8px;} .gap-12{gap:12px;} .gap-16{gap:16px;}
.w100{width:100%;} .text-center{text-align:center;}
/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--navy);box-shadow:0 4px 14px #1D4ED844;}
.btn-out{background:#fff;color:var(--blue);border:2px solid var(--border);}
.btn-out:hover{background:var(--lightblue);}
.btn-red{background:#fff;color:var(--red);border:2px solid #FECACA;padding:8px 14px;font-size:13px;}
.btn-red:hover{background:#FEF2F2;}
.btn-sm{padding:8px 14px;font-size:13px;}
/* ── INPUTS ── */
.inp{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:.2s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px #BFDBFE;}
label.lbl{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.8px;margin-bottom:5px;display:block;text-transform:uppercase;}
/* ── CARDS ── */
.card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 2px 12px #1D4ED80D;}
.card-top-blue{border-top:3px solid var(--blue);}
.card-top-green{border-top:3px solid var(--green);}
.card-top-red{border-top:3px solid var(--red);}
/* ── LAYOUT ── */
#app{min-height:100vh;}
/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1E3A8A 0%,#1D4ED8 60%,#2563EB 100%);}
.login-box{background:#fff;border-radius:22px;padding:44px 36px;width:100%;max-width:420px;box-shadow:0 24px 64px #1E3A8A44;}
.tab-row{display:flex;background:#EFF6FF;border-radius:11px;padding:4px;border:2px solid #DBEAFE;margin-bottom:24px;}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:9px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;transition:.2s;background:transparent;color:#94A3B8;}
.tab-btn.active{background:var(--blue);color:#fff;}
.brand-row{text-align:center;margin-bottom:28px;}
.brand-row img{width:64px;height:64px;border-radius:10px;object-fit:cover;}
.brand-name{font-size:22px;font-weight:800;color:var(--navy);margin-top:8px;}
.brand-sub{font-size:11px;font-weight:700;color:var(--red);letter-spacing:2px;text-transform:uppercase;}
.otp-row{display:flex;gap:10px;}
.otp-row input{flex:1;text-align:center;font-size:24px;font-weight:700;letter-spacing:4px;padding:14px 0;}
.hint-box{margin-top:18px;background:#EFF6FF;border-radius:9px;padding:10px 14px;font-size:12px;color:#94A3B8;text-align:center;border:1px solid #DBEAFE;}
.hint-box b{color:var(--blue);}
.err-msg{color:var(--red);font-size:13px;background:#FEF2F2;padding:9px 13px;border-radius:8px;border:1px solid #FECACA;display:none;}
.err-msg.show{display:block;}
/* ── ADMIN LAYOUT ── */
#adminScreen{display:flex;min-height:100vh;}
.sidebar{width:240px;background:linear-gradient(180deg,#1E3A8A,#1D4ED8);display:flex;flex-direction:column;padding:24px 14px;box-shadow:4px 0 20px #1E3A8A33;flex-shrink:0;}
.sidebar-brand{margin-bottom:32px;padding-left:4px;display:flex;align-items:center;gap:10px;}
.sidebar-brand img{width:40px;height:40px;border-radius:8px;object-fit:cover;}
.sidebar-brand .sbn{font-size:16px;font-weight:800;color:#fff;line-height:1.1;}
.sidebar-brand .sbs{font-size:10px;font-weight:700;color:#FCA5A5;letter-spacing:2px;text-transform:uppercase;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;transition:.2s;margin-bottom:4px;}
.nav-btn.active{background:#2563EB;color:#fff;}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.1);color:#fff;}
.nav-btn .icon{font-size:18px;}
.sidebar-footer{margin-top:auto;}
.main-content{flex:1;overflow:auto;padding:32px;}
/* ── HEADER ── */
.portal-header{background:linear-gradient(90deg,#1E3A8A,#1D4ED8);padding:0 28px;box-shadow:0 4px 16px #1E3A8A44;}
.portal-header-top{display:flex;justify-content:space-between;align-items:center;height:64px;}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-brand img{width:38px;height:38px;border-radius:8px;object-fit:cover;}
.header-brand .hbn{font-size:15px;font-weight:800;color:#fff;}
.header-brand .hbs{font-size:10px;font-weight:700;color:#FCA5A5;letter-spacing:2px;text-transform:uppercase;}
.header-user{text-align:right;}
.header-user .hun{font-size:14px;font-weight:700;color:#fff;}
.header-user .hua{font-size:11px;color:#93C5FD;}
.tab-nav{display:flex;}
.tab-nav button{background:transparent;border:none;border-bottom:3px solid transparent;padding:12px 22px;color:rgba(255,255,255,.55);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:.2s;}
.tab-nav button.active{color:#fff;border-bottom-color:#fff;}
/* ── DASHBOARD STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#fff;border:2px solid var(--border);border-radius:14px;padding:20px;text-align:center;box-shadow:0 2px 8px #1D4ED80D;}
.stat-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;}
.stat-val{font-size:22px;font-weight:800;margin-bottom:4px;}
.stat-lbl{font-size:12px;color:var(--muted);font-weight:600;}
/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:10px 12px;color:var(--sub);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#F8FAFF;}
.tbl td{padding:12px;border-bottom:1px solid #DBEAFE;font-size:14px;}
.tbl tr:hover td{background:#F8FAFF;}
/* ── CUSTOMER CARDS ── */
.cust-card{background:#fff;border:2px solid #DBEAFE;border-radius:14px;padding:18px;cursor:pointer;transition:.2s;margin-bottom:12px;}
.cust-card:hover,.cust-card.open{border-color:var(--blue);box-shadow:0 4px 16px #1D4ED822;}
.cust-detail{margin-top:16px;border-top:2px solid #DBEAFE;padding-top:16px;display:none;}
.cust-card.open .cust-detail{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.detail-item{background:#EFF6FF;border-radius:10px;padding:10px 13px;}
.detail-item .di-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:3px;}
.detail-item .di-v{font-size:14px;font-weight:700;}
/* ── SECTION TABLES ── */
.sec-tbl{border-radius:12px;padding:14px;}
.sec-tbl .sec-lbl{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.sec-tbl .sec-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.sec-tbl .sec-total{display:flex;justify-content:space-between;font-weight:800;font-size:13px;padding-top:8px;margin-top:8px;}
/* ── BROCHURE CARDS ── */
.broch-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.broch-card{background:#fff;border:2px solid #DBEAFE;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px #1D4ED80D;}
.broch-img{width:100%;height:180px;object-fit:cover;display:block;}
.broch-banner{background:linear-gradient(135deg,#1E3A8A,#2563EB);height:88px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.broch-banner-title{font-size:18px;font-weight:800;color:#fff;}
.broch-tag{background:var(--blue);color:#fff;font-size:11px;font-weight:700;border-radius:7px;padding:4px 11px;}
.broch-tag-white{background:#fff;color:var(--blue);}
.broch-body{padding:16px 18px 18px;}
.broch-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.broch-info-item{background:#EFF6FF;border-radius:8px;padding:9px 10px;border:1.5px solid #DBEAFE;}
.broch-info-item .bi-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;}
.broch-info-item .bi-v{font-size:13px;font-weight:700;color:var(--blue);margin-top:2px;}
.profit-box{background:#EFF6FF;border-radius:9px;padding:12px 14px;border-left:3px solid var(--blue);margin-bottom:14px;}
.profit-box .pb-l{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1px;margin-bottom:4px;}
.profit-box .pb-v{font-size:13px;color:var(--text);}
/* ── FORM PANEL ── */
.form-panel{width:380px;background:#fff;border:2px solid #DBEAFE;border-radius:18px;padding:26px;position:sticky;top:0;max-height:96vh;overflow-y:auto;box-shadow:0 8px 40px #1D4ED81A;flex-shrink:0;}
.form-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:20px;}
.form-section{margin-bottom:6px;}
.form-row{display:flex;gap:6px;margin-bottom:7px;}
/* ── IMG UPLOAD ── */
.img-upload-area{border:2px dashed #93C5FD;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;background:#EFF6FF;transition:.2s;}
.img-upload-area:hover{border-color:var(--blue);background:#DBEAFE;}
.img-preview-wrap{position:relative;border-radius:12px;overflow:hidden;border:2px solid #DBEAFE;}
.img-preview-wrap img{width:100%;height:160px;object-fit:cover;display:block;}
.img-del-btn{position:absolute;top:8px;right:8px;background:#DC2626;border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.img-change-btn{position:absolute;bottom:8px;right:8px;background:var(--blue);border:none;border-radius:8px;color:#fff;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
/* ── PORTAL (user) ── */
#portalScreen{min-height:100vh;background:#EFF6FF;}
.portal-main{padding:28px;max-width:900px;margin:0 auto;}
.welcome-card{background:linear-gradient(135deg,#1E3A8A,#2563EB);border-radius:18px;padding:26px 28px;margin-bottom:20px;box-shadow:0 8px 28px #1E3A8A44;color:#fff;}
.wc-name{font-size:26px;font-weight:800;}
.wc-sub{font-size:13px;color:#93C5FD;margin-top:4px;}
.wc-net{font-size:38px;font-weight:800;color:#4ADE80;}
.wc-net-lbl{font-size:12px;color:#93C5FD;}
.info-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.info-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.info-assets-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.asset-card{background:#fff;border:2px solid #DBEAFE;border-radius:14px;padding:20px;}
.ac-row{display:flex;justify-content:space-between;margin-bottom:10px;padding:8px 0;border-bottom:1px solid #DBEAFE;font-size:14px;}
.ac-total{display:flex;justify-content:space-between;font-weight:800;padding-top:10px;}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;display:none;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:18px;padding:30px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:20px;}
/* ── STATUS BADGES ── */
.status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.badge-green{background:#DCFCE7;color:#16A34A;}
.badge-yellow{background:#FEF9C3;color:#D97706;}
.badge-red{background:#FEE2E2;color:#DC2626;}
.badge-blue{background:#DBEAFE;color:#1D4ED8;}
/* ── CHANGE PASSWORD ── */
.admin-actions-bar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:20px;}
/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .broch-grid{grid-template-columns:1fr 1fr;}
  .form-panel{width:320px;}
}
@media(max-width:768px){
  /* Sidebar becomes fixed bottom nav */
  #adminScreen{flex-direction:column;}
  .sidebar{
    width:100%;height:58px;flex-direction:row;
    padding:0 4px;align-items:center;
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    box-shadow:0 -2px 16px #1E3A8A44;
    justify-content:space-around;border-radius:0;
  }
  .sidebar-brand{display:none!important;}
  .nav-btn{
    flex-direction:column;gap:1px;padding:5px 0;
    font-size:9px;border-radius:8px;margin-bottom:0;
    flex:1;justify-content:center;align-items:center;min-width:0;
  }
  .nav-btn .icon{font-size:22px;}
  .nav-btn span:last-child{font-size:9px;font-weight:700;white-space:nowrap;}
  .sidebar-footer{display:none;}
  .main-content{
    padding:14px 12px 74px 12px;
    overflow:auto;width:100%;
  }
  /* Stats */
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat-card{padding:14px 10px;}
  .stat-val{font-size:18px;}
  .stat-icon{width:38px;height:38px;font-size:15px;}
  /* Form panel: slide-up overlay */
  .form-panel{
    width:100%!important;
    position:fixed!important;
    bottom:58px;left:0;right:0;top:auto;
    max-height:82vh;
    border-radius:20px 20px 0 0;
    z-index:199;
    box-shadow:0 -8px 40px #1E3A8A33;
    padding:20px 16px 16px;
    overflow-y:auto;
  }
  .form-row{flex-direction:column;gap:8px;margin-bottom:0;}
  /* Brochures */
  .broch-grid{grid-template-columns:1fr;gap:12px;}
  /* Customer cards */
  .cust-card{padding:14px;}
  .detail-grid{grid-template-columns:1fr 1fr;}
  /* Portal */
  .portal-main{padding:14px 12px 24px 12px;}
  .info-grid3{grid-template-columns:1fr 1fr;gap:10px;}
  .info-grid2{grid-template-columns:1fr 1fr;gap:10px;}
  .info-assets-grid{grid-template-columns:1fr;}
  .wc-name{font-size:20px;}
  .wc-net{font-size:28px;}
  .portal-header{padding:0 14px;}
  .tab-nav button{padding:10px 12px;font-size:13px;}
  /* Login */
  .login-box{padding:28px 18px;margin:12px;}
  /* Tables */
  .tbl{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  /* Admin actions */
  .admin-actions-bar{flex-wrap:wrap;gap:8px;}
}
@media(max-width:390px){
  .info-grid3{grid-template-columns:1fr;}
  .info-grid2{grid-template-columns:1fr;}
  .stat-val{font-size:15px;}
  .nav-btn span:last-child{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

let currentSession = null;
let pendingOtp = null;
let pendingUserId = null;
let currentTab = 'admin';

function inr(n){ return '₹' + Number(n).toLocaleString('en-IN',{maximumFractionDigits:0}); }

function switchTab(tab){
  currentTab = tab;
  document.getElementById('adminLoginForm').classList.toggle('hidden', tab!=='admin');
  document.getElementById('userLoginForm').classList.toggle('hidden', tab!=='user');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(tab==='admin'&&i===0)||(tab==='user'&&i===1));
  });
  hideErr('adminErr'); hideErr('userErr');
}

function showErr(id,msg){ const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }
function hideErr(id){ document.getElementById(id).classList.remove('show'); }

function doAdminLogin(){
  const u=document.getElementById('adminUser').value.trim();
  const p=document.getElementById('adminPass').value;
  const admin=DB.get('admin');
  if(u===admin.username && p===admin.password){
    currentSession={role:'admin'};
    show('adminScreen'); hide('loginScreen');
    adminNav('dashboard');
  } else { showErr('adminErr','Invalid credentials.'); }
}

async function doUserLogin(){
  const acc = document.getElementById('userAcc').value.trim();
  if(!acc){ showErr('userErr','Please enter your account number or mobile.'); return; }
  const customers = DB.get('customers')||[];
  const cust = customers.find(c => c.accountNumber===acc || c.mobile===acc);
  if(!cust){ showErr('userErr','Account not found. Please contact admin.'); return; }

  pendingOtp = String(Math.floor(100000 + Math.random()*900000));
  pendingUserId = cust.id;

  const cfg = DB.get('smsconfig')||{};
  const apiKey = (cfg.apikey||'').trim();
  const mobile = cust.mobile.replace(/[^0-9]/g,'').slice(-10);

  const btn = document.getElementById('userLoginBtn');
  btn.textContent = 'Sending OTP…';
  btn.disabled = true;

  if(apiKey){
    const sent = await sendFast2SMS(apiKey, mobile, pendingOtp);
    btn.textContent = 'Send OTP →';
    btn.disabled = false;
    if(sent){
      document.getElementById('demoOtpWrap').style.display = 'block';
      document.getElementById('demoOtpShow').textContent = '';
      document.getElementById('otpSection').classList.remove('hidden');
      document.getElementById('userLoginBtn').classList.add('hidden');
      document.getElementById('verifyOtpBtn').classList.remove('hidden');
      hideErr('userErr');
    } else {
      showErr('userErr','SMS failed. Check API key in Settings or try demo mode.');
      fallbackOtp();
    }
  } else {
    btn.textContent = 'Send OTP →';
    btn.disabled = false;
    fallbackOtp();
  }
}

async function sendFast2SMS(apiKey, mobile, otp){
  try {
    const msg = encodeURIComponent('Your JCCS LPT Investment OTP is ' + otp + '. Valid for 10 minutes. Do not share.');
    // Fast2SMS Quick SMS endpoint
    const url = 'https://www.fast2sms.com/dev/bulkV2?authorization=' + encodeURIComponent(apiKey) +
      '&route=q&message=' + msg + '&language=english&flash=0&numbers=' + mobile;
    const res = await fetch(url, { method:'GET', headers:{'cache-control':'no-cache'} });
    const data = await res.json();
    return data.return === true;
  } catch(e){ return false; }
}

function fallbackOtp(){
  // Demo mode — show OTP on screen
  document.getElementById('demoOtpWrap').style.display = 'block';
  document.getElementById('demoOtpShow').textContent = '(Demo OTP: ' + pendingOtp + ')';
  document.getElementById('otpSection').classList.remove('hidden');
  document.getElementById('userLoginBtn').classList.add('hidden');
  document.getElementById('verifyOtpBtn').classList.remove('hidden');
  hideErr('userErr');
}

function verifyOtp(){
  const entered = document.getElementById('otpInput').value.trim();
  if(entered.length < 6){ showErr('userErr','Please enter the 6-digit OTP.'); return; }
  if(entered === pendingOtp){
    const customers = DB.get('customers')||[];
    const cust = customers.find(c => c.id===pendingUserId);
    currentSession = {role:'user', customerId:pendingUserId};
    document.getElementById('portalUserName').textContent = cust.name;
    document.getElementById('portalUserAcc').textContent = cust.accountNumber;
    show('portalScreen'); hide('loginScreen');
    portalTab('myinv');
  } else {
    showErr('userErr','Wrong OTP. Please check and try again.');
  }
}

function logout(){
  currentSession=null; pendingOtp=null; pendingUserId=null;
  hide('adminScreen'); hide('portalScreen');
  show('loginScreen');
  document.getElementById('adminUser').value='';
  document.getElementById('adminPass').value='';
  document.getElementById('userAcc').value='';
  document.getElementById('otpInput').value='';
  document.getElementById('otpSection').classList.add('hidden');
  document.getElementById('userLoginBtn').classList.remove('hidden');
  document.getElementById('verifyOtpBtn').classList.add('hidden');
  switchTab('admin');
}

function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

let assetRowCount = 0;
function addAssetRow(){
  const rows=document.getElementById('assetRows');
  const i=Date.now();
  rows.insertAdjacentHTML('beforeend',`<div class="form-row" id="ar${i}">
    <input class="inp" placeholder="Label" id="al${i}" style="flex:2;"/>
    <input class="inp" placeholder="₹" type="number" id="av${i}" style="flex:1;"/>
    <button class="btn btn-red" onclick="removeAssetRow('${i}')" style="padding:8px 10px;">✕</button>
  </div>`);
}
function removeAssetRow(i){ const el=document.getElementById('ar'+i); if(el) el.remove(); }

function saveCust(){
  const name=document.getElementById('cfName').value.trim();
  const acc=document.getElementById('cfAcc').value.trim();
  if(!name||!acc){ alert('Name and Account Number required.'); return; }
  const pan=document.getElementById('cfPan').value.trim().toUpperCase();
  if(pan && !/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan)){ alert('Invalid PAN format. Expected: ABCDE1234F'); return; }
  const aadhar=document.getElementById('cfAadhar').value.trim();
  if(aadhar && !/^\d{12}$/.test(aadhar)){ alert('Aadhaar must be exactly 12 digits.'); return; }
  const rows=document.querySelectorAll('#assetRows .form-row');
  const assets=[];
  rows.forEach(row=>{
    const label=row.querySelector('[id^="al"]')?.value?.trim();
    const value=parseFloat(row.querySelector('[id^="av"]')?.value)||0;
    if(label) assets.push({label,value});
  });
  const customers=DB.get('customers')||[];
  const entry={
    id:editCustId||Date.now(),
    name,
    mobile:document.getElementById('cfMob').value.trim(),
    pan,
    aadhar,
    address:{
      line1:document.getElementById('cfAddr1').value.trim(),
      city:document.getElementById('cfCity').value.trim(),
      state:document.getElementById('cfState').value.trim(),
      pin:document.getElementById('cfPin').value.trim(),
      country:document.getElementById('cfCountry').value.trim()||'India'
    },
    nominee:{
      name:document.getElementById('cfNomName').value.trim(),
      relation:document.getElementById('cfNomRel').value.trim(),
      mobile:document.getElementById('cfNomMob').value.trim()
    },
    accountNumber:acc,
    depositAccountNumber:document.getElementById('cfDep').value.trim(),
    investmentDate:document.getElementById('cfInvDate').value,
    investmentAmount:parseFloat(document.getElementById('cfAmt').value)||0,
    profitRatio:parseFloat(document.getElementById('cfProfit').value)||0,
    lockingPeriod:document.getElementById('cfLock').value.trim(),
    maturedPeriod:document.getElementById('cfMat').value,
    assets
  };
  if(editCustId){ const idx=customers.findIndex(c=>c.id===editCustId); customers[idx]=entry; }
  else customers.push(entry);
  DB.set('customers',customers);
  custFormOpen=false; editCustId=null;
  adminNav('customers');
}
function closeCustForm(){ custFormOpen=false; editCustId=null; adminNav('customers'); }
function deleteCust(id){
  if(!confirm('Delete this customer?')) return;
  const customers=DB.get('customers')||[];
  DB.set('customers',customers.filter(c=>c.id!==id));
  adminNav('customers');
}

function saveSettings(){
  const admin = DB.get('admin');
  const cur = document.getElementById('sCurPass').value;
  const newU = document.getElementById('sNewUser').value.trim();
  const newP = document.getElementById('sNewPass').value;
  const conf = document.getElementById('sConfPass').value;
  const errEl = document.getElementById('settingsErr');
  const okEl = document.getElementById('settingsOk');
  errEl.classList.remove('show'); okEl.style.display='none';
  if(cur!==admin.password){ errEl.textContent='Current password incorrect.'; errEl.classList.add('show'); return; }
  if(!newU){ errEl.textContent='New username required.'; errEl.classList.add('show'); return; }
  if(newP.length<6){ errEl.textContent='Password must be at least 6 characters.'; errEl.classList.add('show'); return; }
  if(newP!==conf){ errEl.textContent='Passwords do not match.'; errEl.classList.add('show'); return; }
  DB.set('admin',{username:newU,password:newP});
  okEl.style.display='block';
  setTimeout(()=>{ const el=document.getElementById('settingsOk'); if(el) el.style.display='none'; },3000);
}

function saveSale(){
  const sales = DB.get('sales')||[];
  const area = parseFloat(document.getElementById('sf_area').value)||0;

  const entry = {
    id: editSaleId||Date.now(),
    date: document.getElementById('sf_date').value,
    plotNo: document.getElementById('sf_plot').value.trim(),
    buyer: document.getElementById('sf_buyer').value.trim(),
    area: area, unit: document.getElementById('sf_unit').value,
    ratePerUnit: rate, total: area*rate,
    status: document.getElementById('sf_status').value,
    notes: document.getElementById('sf_notes').value.trim()
  };
  if(editSaleId){ const idx=sales.findIndex(x=>x.id===editSaleId); sales[idx]=entry; }
  else sales.push(entry);
  DB.set('sales',sales);
  saleForm=false; editSaleId=null;
  document.getElementById('adminMain').innerHTML=renderReports();
}

  };
  if(editPurchaseId){ const idx=purchases.findIndex(x=>x.id===editPurchaseId); purchases[idx]=entry; }
  else purchases.push(entry);
  DB.set('purchases',purchases);
  purchaseForm=false; editPurchaseId=null;
  document.getElementById('adminMain').innerHTML=renderReports();
}

/* ── INVENTORY REPORT ── */
function renderInventoryReport(){

  const totalMktVal = inv.reduce((s,i)=>s+i.currentValue,0);
  const available = inv.filter(i=>i.status==='Available');
  const cards = '<div class="stats-grid" style="margin-bottom:20px;">'
    + statCard('📦','Total Properties',inv.length,'#0284C7')
    + statCard('💰','Purchase Value',inr(totalCost),'#DC2626')
    + statCard('📈','Market Value',inr(totalMktVal),'#16A34A')

/* ── BALANCE SHEET (Banking Style) ── */
function renderBalanceSheet(){
  const customers = DB.get('customers')||[];
  const purchases = DB.get('purchases')||[];
  const sales = DB.get('sales')||[];
  const inv = DB.get('inventory')||[];
  const investments = DB.get('investments')||[];
  const charges = DB.get('charges')||[];
  const cf = DB.get('cashflow')||[];

  // Assets
  const cashIn = cf.filter(c=>c.type==='Cash In').reduce((s,c)=>s+c.amount,0);
  const cashOut = cf.filter(c=>c.type==='Cash Out').reduce((s,c)=>s+c.amount,0);
  const cashInHand = cashIn - cashOut;
  const bankIn = cf.filter(c=>c.type==='Bank Receipt').reduce((s,c)=>s+c.amount,0);
  const bankOut = cf.filter(c=>c.type==='Bank Payment').reduce((s,c)=>s+c.amount,0);
  const bankBalance = bankIn - bankOut;
  const inventoryMktVal = inv.reduce((s,i)=>s+i.currentValue,0);
  const extPortfolio = investments.reduce((s,i)=>s+i.currentValue,0);
  const saleReceivable = sales.filter(s=>s.status==='Pending').reduce((s,sl)=>s+sl.total,0);
  const totalAssets = cashInHand + bankBalance + inventoryMktVal + extPortfolio + saleReceivable;

  // Liabilities
  const custPrincipal = customers.reduce((s,c)=>s+(c.investmentAmount||0),0);
  const estimatedInterest = customers.reduce((s,c)=>s+((c.investmentAmount||0)*(c.profitRatio||0)/100),0);
  const purchasePending = purchases.filter(p=>p.status==='Pending').reduce((s,p)=>s+p.amount,0);
  const chargesPending = charges.filter(c=>c.status==='Pending').reduce((s,c)=>s+c.amount,0);
  const totalLiabilities = custPrincipal + estimatedInterest + purchasePending + chargesPending;
  const netWorth = totalAssets - totalLiabilities;

  const bsSectionHdr = (title,color)=>'<tr style="background:'+color+';"><td colspan="2" style="padding:10px 14px;font-size:12px;font-weight:800;color:#fff;letter-spacing:1px;">'+title+'</td></tr>';
  const bsRow2 = (label,amount,indent,bold)=>'<tr style="border-bottom:1px solid #EFF6FF;'+(bold?'background:#F8FAFC;':'')+'"><td style="padding:'+(bold?'12':'9')+'px '+(indent?'28':'14')+'px;font-size:'+(bold?'14':'13')+'px;font-weight:'+(bold?'700':'500')+';color:'+(bold?'#1E293B':'#475569')+';">'+label+'</td><td style="padding:9px 14px;text-align:right;font-size:'+(bold?'15':'13')+'px;font-weight:'+(bold?'800':'600')+';">'+inr(amount)+'</td></tr>';
  const bsTotal = (label,amount,color)=>'<tr style="background:'+color+'22;border-top:2px solid '+color+';"><td style="padding:12px 14px;font-size:14px;font-weight:800;color:'+color+';">'+label+'</td><td style="padding:12px 14px;text-align:right;font-size:17px;font-weight:800;color:'+color+';">'+inr(amount)+'</td></tr>';

  const assetsTable = '<div style="overflow-x:auto;flex:1;"><div class="card" style="border-top:3px solid #16A34A;padding:0;overflow:hidden;min-width:280px;">'
    +'<table style="width:100%;border-collapse:collapse;">'
    + bsSectionHdr('ASSETS','#16A34A')
    + bsSectionHdr('A. CASH AND BANK','#0284C7')
    + bsRow2('Cash in Hand',cashInHand,true,false)
    + bsRow2('Bank Balance',bankBalance,true,false)
    + bsTotal('Total Cash & Bank',cashInHand+bankBalance,'#0284C7')
    + bsSectionHdr('B. INVESTMENTS & PROPERTY','#7C3AED')
    + bsRow2('Property Inventory (Market Value)',inventoryMktVal,true,false)
    + bsRow2('External Investment Portfolio',extPortfolio,true,false)
    + bsTotal('Total Investments',inventoryMktVal+extPortfolio,'#7C3AED')
    + bsSectionHdr('C. RECEIVABLES','#D97706')
    + bsRow2('Pending Sale Receivables',saleReceivable,true,false)
    + bsTotal('Total Receivables',saleReceivable,'#D97706')
    + bsTotal('TOTAL ASSETS',totalAssets,'#16A34A')
    +'</table></div></div>';

  const liabTable = '<div style="overflow-x:auto;flex:1;"><div class="card" style="border-top:3px solid #DC2626;padding:0;overflow:hidden;min-width:280px;">'
    +'<table style="width:100%;border-collapse:collapse;">'
    + bsSectionHdr('LIABILITIES','#DC2626')
    + bsSectionHdr('A. CAPITAL & RESERVES','#7C3AED')
    + bsRow2('Customer Investment (Principal)',custPrincipal,true,false)
    + bsTotal('Total Capital',custPrincipal,'#7C3AED')
    + bsSectionHdr('B. CURRENT LIABILITIES','#D97706')
    + bsRow2('Profit/Interest Payable to Customers',estimatedInterest,true,false)
    + bsRow2('Pending Purchase Payments',purchasePending,true,false)
    + bsRow2('Pending Charges Payable',chargesPending,true,false)
    + bsTotal('Total Current Liabilities',estimatedInterest+purchasePending+chargesPending,'#D97706')
    + bsTotal('TOTAL LIABILITIES',totalLiabilities,'#DC2626')
    +'</table></div></div>';

  const verify = totalAssets === totalLiabilities + netWorth;
  const netWorthCard = '<div class="card" style="background:linear-gradient(135deg,#1E3A8A,#2563EB);border:none;margin-top:16px;">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">'
    +'<div><div style="font-size:13px;font-weight:700;color:#93C5FD;letter-spacing:1px;">NET WORTH / EQUITY</div>'
    +'<div style="font-size:11px;color:#BFDBFE;margin-top:4px;">Total Assets ('+inr(totalAssets)+') − Total Liabilities ('+inr(totalLiabilities)+')</div></div>'
    +'<div style="font-size:30px;font-weight:800;color:'+(netWorth>=0?'#4ADE80':'#FCA5A5')+';">'+inr(netWorth)+'</div></div>'
    +'<div style="margin-top:14px;display:flex;gap:16px;flex-wrap:wrap;">'
    +'<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:10px 16px;flex:1;text-align:center;"><div style="font-size:11px;color:#93C5FD;font-weight:700;">ASSETS</div><div style="font-size:18px;font-weight:800;color:#fff;">'+inr(totalAssets)+'</div></div>'
    +'<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:10px 16px;flex:1;text-align:center;"><div style="font-size:11px;color:#FCA5A5;font-weight:700;">LIABILITIES</div><div style="font-size:18px;font-weight:800;color:#fff;">'+inr(totalLiabilities)+'</div></div>'
    +'<div style="background:'+(verify?'rgba(74,222,128,.15)':'rgba(252,165,165,.15)')+';border-radius:10px;padding:10px 16px;flex:1;text-align:center;"><div style="font-size:11px;color:#93C5FD;font-weight:700;">BALANCE CHECK</div><div style="font-size:15px;font-weight:800;color:'+(verify?'#4ADE80':'#FCA5A5')+'">'+(verify?'✅ Tallied':'⚠️ Difference: '+inr(Math.abs(totalAssets-totalLiabilities-netWorth)))+'</div></div>'
    +'</div></div>';

  return '<div style="display:flex;gap:16px;flex-wrap:wrap;">' + assetsTable + liabTable + '</div>' + netWorthCard;
}

/* ── P&L REPORT (Banking Style) ── */
function renderPLReport(){
  const customers = DB.get('customers')||[];
  const purchases = DB.get('purchases')||[];
  const sales = DB.get('sales')||[];
  const investments = DB.get('investments')||[];
  const inv = DB.get('inventory')||[];
  const charges = DB.get('charges')||[];

  // INCOME
  const saleRevenue = sales.filter(s=>s.status==='Completed').reduce((s,sl)=>s+sl.total,0);
  const invGain = investments.reduce((s,i)=>s+(i.currentValue-i.investedAmount),0);
  const invAppreciation = inv.reduce((s,i)=>s+(i.currentValue-i.purchaseValue),0);
  const interestEarnable = customers.reduce((s,c)=>s+((c.investmentAmount||0)*(c.profitRatio||0)/100),0);
  const totalIncome = saleRevenue + invGain + invAppreciation;

  // EXPENSES
  const purchaseCost = purchases.filter(p=>p.status==='Completed').reduce((s,p)=>s+p.amount,0);
  const interestPayable = interestEarnable;
  const chargesTotal = charges.filter(c=>c.status==='Paid').reduce((s,c)=>s+c.amount,0);
  const chargesByType = {};
  charges.filter(c=>c.status==='Paid').forEach(c=>{ chargesByType[c.type]=(chargesByType[c.type]||0)+c.amount; });
  const totalExpenses = purchaseCost + interestPayable + chargesTotal;
  const grossProfit = saleRevenue - purchaseCost;
  const netPL = totalIncome - totalExpenses;

  const plSec = (title,color)=>'<tr style="background:'+color+';"><td colspan="2" style="padding:10px 14px;font-size:12px;font-weight:800;color:#fff;letter-spacing:1px;">'+title+'</td></tr>';
  const plRow2 = (label,val,indent,bold)=>'<tr style="border-bottom:1px solid #EFF6FF;"><td style="padding:'+(bold?'12':'9')+'px '+(indent?'28':'14')+'px;font-size:'+(bold?'14':'13')+'px;font-weight:'+(bold?'700':'400')+';color:'+(bold?'#1E293B':'#475569')+';">'+label+'</td><td style="padding:9px 14px;text-align:right;font-size:'+(bold?'15':'13')+'px;font-weight:'+(bold?'800':'500')+';color:'+(val>=0?'#16A34A':'#DC2626')+';">'+(val>=0?'+':'')+inr(val)+'</td></tr>';
  const plTotal = (label,val,color)=>'<tr style="background:'+color+'22;border-top:2px solid '+color+';"><td style="padding:12px 14px;font-size:14px;font-weight:800;color:'+color+';">'+label+'</td><td style="padding:12px 14px;text-align:right;font-size:17px;font-weight:800;color:'+color+';">'+(val>=0?'+':'')+inr(val)+'</td></tr>';

  const incomeTable = '<div style="overflow-x:auto;flex:1;"><div class="card" style="border-top:3px solid #16A34A;padding:0;overflow:hidden;min-width:280px;">'
    +'<table style="width:100%;border-collapse:collapse;">'
    + plSec('INCOME','#16A34A')
    + plSec('A. TRADING INCOME','#0284C7')
    + plRow2('Plot / Property Sales Revenue',saleRevenue,true,false)
    + plTotal('Gross Trading Income',saleRevenue,'#0284C7')
    + plSec('B. INVESTMENT INCOME','#7C3AED')
    + plRow2('External Portfolio Gain',invGain,true,false)
    + plRow2('Property Appreciation',invAppreciation,true,false)
    + plTotal('Total Investment Income',invGain+invAppreciation,'#7C3AED')
    + plTotal('TOTAL INCOME',totalIncome,'#16A34A')
    +'</table></div></div>';

  const expenseTable = '<div style="overflow-x:auto;flex:1;"><div class="card" style="border-top:3px solid #DC2626;padding:0;overflow:hidden;min-width:280px;">'
    +'<table style="width:100%;border-collapse:collapse;">'
    + plSec('EXPENSES','#DC2626')
    + plSec('A. COST OF PURCHASES','#D97706')
    + plRow2('Property / Land Purchase Cost',purchaseCost,true,false)
    + plTotal('Total Purchase Cost',purchaseCost,'#D97706')
    + plSec('B. FINANCIAL EXPENSES','#DC2626')
    + plRow2('Interest / Profit Payable to Investors',interestPayable,true,false)
    + plTotal('Total Financial Expenses',interestPayable,'#DC2626')
    + plSec('C. OPERATIONAL CHARGES','#7C3AED')
    + Object.entries(chargesByType).map(([type,amt])=>plRow2(type,amt,true,false)).join('')
    + plTotal('Total Charges',chargesTotal,'#7C3AED')
    + plTotal('TOTAL EXPENSES',totalExpenses,'#DC2626')
    +'</table></div></div>';

  const summaryCard = '<div class="card" style="border-top:3px solid '+(netPL>=0?'#16A34A':'#DC2626')+';margin-top:16px;">'
    +'<div style="font-size:14px;font-weight:800;color:#1E3A8A;margin-bottom:12px;">📋 P&L SUMMARY</div>'
    +'<table style="width:100%;border-collapse:collapse;">'
    + plSec('PROFIT & LOSS ACCOUNT','#1E3A8A')
    + plRow2('Gross Profit (Sales − Purchase Cost)',grossProfit,false,true)
    + plRow2('Total Income',totalIncome,false,false)
    + plRow2('Total Expenses',totalExpenses*-1,false,false)
    + plRow2('Net Profit / (Loss)',netPL,false,true)
    +'</table>'
    +'<div style="background:linear-gradient(135deg,'+(netPL>=0?'#16A34A':'#DC2626')+','+(netPL>=0?'#15803D':'#B91C1C')+');border-radius:12px;padding:16px 20px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;">'
    +'<div><div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1px;">NET '+(netPL>=0?'PROFIT':'LOSS')+'</div><div style="font-size:11px;color:rgba(255,255,255,.5);">Current Period</div></div>'
    +'<div style="font-size:28px;font-weight:800;color:#fff;">'+inr(Math.abs(netPL))+'</div>'
    +'</div></div>';

  return '<div style="display:flex;gap:16px;flex-wrap:wrap;">' + incomeTable + expenseTable + '</div>' + summaryCard;
}

let chargeForm=false, editChargeId=null;
function renderChargesReport(){
  const charges = DB.get('charges')||[];
  const totalCharges = charges.reduce((s,c)=>s+c.amount,0);
  const paid = charges.filter(c=>c.status==='Paid');
  const pending = charges.filter(c=>c.status==='Pending');
  const byType = {};
  charges.forEach(c=>{ byType[c.type]=(byType[c.type]||0)+c.amount; });

  const cards = '<div class="stats-grid" style="margin-bottom:20px;">'
    + statCard('🧾','Total Charges',charges.length,'#7C3AED')
    + statCard('💸','Total Amount',inr(totalCharges),'#DC2626')
    + statCard('✅','Paid',inr(paid.reduce((s,c)=>s+c.amount,0)),'#16A34A')
    + statCard('⏳','Pending',inr(pending.reduce((s,c)=>s+c.amount,0)),'#D97706')
    + '</div>';

  const typeBreakdown = '<div class="card" style="margin-bottom:16px;border-top:3px solid #7C3AED;">'
    +'<div style="font-size:13px;font-weight:800;color:#1E3A8A;margin-bottom:12px;">Charges Breakdown by Type</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;">'
    + Object.entries(byType).map(([type,amt])=>'<div style="background:#F5F3FF;border-radius:10px;padding:12px;border-left:4px solid #7C3AED;"><div style="font-size:11px;font-weight:700;color:#7C3AED;">'+type.toUpperCase()+'</div><div style="font-size:18px;font-weight:800;color:#1E293B;margin-top:4px;">'+inr(amt)+'</div></div>').join('')
    +'</div></div>';

  const addBtn = '<button class="btn btn-blue btn-sm" style="margin-bottom:14px;" onclick="chargeForm=true;editChargeId=null;document.getElementById(\'adminMain\').innerHTML=renderReports();">+ Add Charge</button>';
  let formHtml = chargeForm ? renderChargeForm() : '';

  const rows = charges.map(c=>'<tr><td>'+formatDate(c.date)+'</td><td><span style="background:#EDE9FE;color:#7C3AED;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;">'+c.type+'</span></td><td>'+c.description+'</td><td>'+c.paidTo+'</td><td>'+c.plotRef+'</td><td style="color:#DC2626;font-weight:700;">'+inr(c.amount)+'</td><td><span class="status-badge '+(c.status==='Paid'?'badge-green':'badge-yellow')+'">'+c.status+'</span></td><td><button class="btn btn-out btn-sm" onclick="editChargeId='+c.id+';chargeForm=true;document.getElementById(\'adminMain\').innerHTML=renderReports();">✎</button> <button class="btn btn-red" onclick="deleteCharge('+c.id+')">✕</button></td></tr>').join('');
  const tbl = '<div style="overflow-x:auto;"><table class="tbl" style="min-width:700px;"><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Paid To</th><th>Plot Ref</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+rows+(rows?'':'<tr><td colspan="8" style="text-align:center;color:#94A3B8;padding:40px;">No charges yet.</td></tr>')+'</tbody></table></div>';
  return cards + typeBreakdown + addBtn + (formHtml?formHtml+'<br/>':'') + reportCard('All Charges', tbl);
}

function renderChargeForm(){
  const charges = DB.get('charges')||[];
  const ch = editChargeId ? charges.find(x=>x.id===editChargeId) : null;
  const chargeTypes = ['Writer Charges','Registration Charges','Maintenance Charges','Legal Charges','Survey Charges','Stamp Duty','Brokerage','Other'];
  return '<div class="card" style="border-top:3px solid #7C3AED;margin-bottom:14px;max-width:620px;">'
    +'<div style="font-size:16px;font-weight:800;color:#1E3A8A;margin-bottom:16px;">'+(editChargeId?'Edit Charge':'Add New Charge')+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
    +'<div><label class="lbl">Date</label><input class="inp" id="chf_date" type="date" value="'+(ch?ch.date:'')+'"/></div>'
    +'<div><label class="lbl">Charge Type</label><select class="inp" id="chf_type">'
    + chargeTypes.map(t=>'<option '+(ch&&ch.type===t?'selected':'')+' value="'+t+'">'+t+'</option>').join('')
    +'</select></div>'
    +'<div style="grid-column:1/-1"><label class="lbl">Description</label><input class="inp" id="chf_desc" value="'+(ch?ch.description:'')+'"/></div>'
    +'<div><label class="lbl">Paid To</label><input class="inp" id="chf_paidto" value="'+(ch?ch.paidTo:'')+'"/></div>'
    +'<div><label class="lbl">Amount (₹)</label><input class="inp" id="chf_amt" type="number" value="'+(ch?ch.amount:'')+'"/></div>'
    +'<div><label class="lbl">Plot / Property Ref</label><input class="inp" id="chf_plot" value="'+(ch?ch.plotRef:'')+'"/></div>'
    +'<div><label class="lbl">Status</label><select class="inp" id="chf_status"><option '+(ch&&ch.status==='Paid'?'selected':'')+' value="Paid">Paid</option><option '+(ch&&ch.status==='Pending'?'selected':'')+' value="Pending">Pending</option></select></div>'
    +'</div>'
    +'<div style="display:flex;gap:10px;margin-top:14px;">'
    +'<button class="btn btn-blue" onclick="saveCharge()">💾 Save</button>'
    +'<button class="btn btn-out" onclick="chargeForm=false;editChargeId=null;document.getElementById(\'adminMain\').innerHTML=renderReports();">Cancel</button>'
    +'</div></div>';
}

function saveCharge(){
  const charges = DB.get('charges')||[];
  const entry = {
    id: editChargeId||Date.now(),
    date: document.getElementById('chf_date').value,
    type: document.getElementById('chf_type').value,
    description: document.getElementById('chf_desc').value.trim(),
    paidTo: document.getElementById('chf_paidto').value.trim(),
    amount: parseFloat(document.getElementById('chf_amt').value)||0,
    plotRef: document.getElementById('chf_plot').value.trim(),
    status: document.getElementById('chf_status').value
  };
  if(editChargeId){ const idx=charges.findIndex(x=>x.id===editChargeId); charges[idx]=entry; }
  else charges.push(entry);
  DB.set('charges',charges);
  chargeForm=false; editChargeId=null;
  document.getElementById('adminMain').innerHTML=renderReports();
}
function deleteCharge(id){ if(confirm('Delete this charge?')){ DB.set('charges',(DB.get('charges')||[]).filter(x=>x.id!==id)); document.getElementById('adminMain').innerHTML=renderReports(); } }

// ════════════════════════════════════════════════════════
// CASH FLOW
// ════════════════════════════════════════════════════════
let cashForm=false, editCashId=null;
const DENOMS = [2000,500,200,100,50,20,10,5,2,1];

function renderCashFlow(){
  const cf = DB.get('cashflow')||[];
  const cashIn = cf.filter(c=>c.type==='Cash In').reduce((s,c)=>s+c.amount,0);
  const cashOut = cf.filter(c=>c.type==='Cash Out').reduce((s,c)=>s+c.amount,0);
  const bankIn = cf.filter(c=>c.type==='Bank Receipt').reduce((s,c)=>s+c.amount,0);
  const bankOut = cf.filter(c=>c.type==='Bank Payment').reduce((s,c)=>s+c.amount,0);
  const netCash = cashIn - cashOut;
  const netBank = bankIn - bankOut;

  // Denomination totals from all cash-in entries
  const denomTotals = {};
  DENOMS.forEach(d=>{ denomTotals[d]=0; });
  cf.filter(c=>c.type==='Cash In'&&c.denomination).forEach(c=>{
    DENOMS.forEach(d=>{ denomTotals[d]+=(c.denomination[d]||0); });
  });
  const totalCashInHand = DENOMS.reduce((s,d)=>s+(denomTotals[d]*d),0);

  const summary = '<div class="stats-grid" style="margin-bottom:20px;">'
    + statCard('💵','Cash In Hand',inr(netCash),'#16A34A')
    + statCard('🏦','Bank Balance (Net)',inr(netBank),'#1D4ED8')
    + statCard('📥','Total Cash In',inr(cashIn),'#16A34A')
    + statCard('📤','Total Cash Out',inr(cashOut),'#DC2626')
    + '</div>';

  // Denomination table
  const denomTable = '<div class="card" style="border-top:3px solid #16A34A;margin-bottom:16px;max-width:480px;">'
    +'<div style="font-size:13px;font-weight:800;color:#1E3A8A;margin-bottom:12px;">💵 Cash In Hand — Denomination Breakdown</div>'
    +'<table class="tbl"><thead><tr><th>Denomination</th><th>Count</th><th>Value</th></tr></thead><tbody>'
    + DENOMS.map(d=>'<tr><td>₹'+d+'</td><td style="text-align:center;">'+denomTotals[d]+'</td><td style="color:#16A34A;font-weight:700;">'+inr(denomTotals[d]*d)+'</td></tr>').join('')
    +'<tr style="background:#DCFCE7;font-weight:800;"><td colspan="2">TOTAL CASH IN HAND</td><td style="color:#16A34A;font-size:15px;">'+inr(netCash)+'</td></tr>'
    +'</tbody></table></div>';

  // Bank-wise summary
  const banks = {};
  cf.filter(c=>c.bank).forEach(c=>{
    if(!banks[c.bank]) banks[c.bank]={in:0,out:0};
    if(c.type==='Bank Receipt') banks[c.bank].in+=c.amount;
    if(c.type==='Bank Payment') banks[c.bank].out+=c.amount;
  });
  const bankTable = Object.keys(banks).length>0 ? '<div class="card" style="border-top:3px solid #1D4ED8;margin-bottom:16px;">'
    +'<div style="font-size:13px;font-weight:800;color:#1E3A8A;margin-bottom:12px;">🏦 Bank-wise Summary</div>'
    +'<table class="tbl"><thead><tr><th>Bank</th><th>Receipts</th><th>Payments</th><th>Balance</th></tr></thead><tbody>'
    + Object.entries(banks).map(([bank,v])=>'<tr><td><b>'+bank+'</b></td><td style="color:#16A34A;font-weight:700;">'+inr(v.in)+'</td><td style="color:#DC2626;font-weight:700;">'+inr(v.out)+'</td><td style="color:'+(v.in-v.out>=0?'#1D4ED8':'#DC2626')+';font-weight:800;">'+inr(v.in-v.out)+'</td></tr>').join('')
    +'</tbody></table></div>' : '';

  const addBtn = '<button class="btn btn-blue btn-sm" style="margin-bottom:14px;" onclick="cashForm=true;editCashId=null;document.getElementById(\'adminMain\').innerHTML=renderCashFlow();">+ Add Entry</button>';
  let formHtml = cashForm ? renderCashForm() : '';

  const rows = cf.map(c=>'<tr><td>'+formatDate(c.date)+'</td><td><span style="background:'+(c.type==='Cash In'||c.type==='Bank Receipt'?'#DCFCE7':'#FEE2E2')+';color:'+(c.type==='Cash In'||c.type==='Bank Receipt'?'#16A34A':'#DC2626')+';padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;">'+c.type+'</span></td><td>'+c.subtype+'</td><td>'+c.description+'</td><td>'+(c.bank||'Cash')+'</td><td style="color:'+(c.type==='Cash In'||c.type==='Bank Receipt'?'#16A34A':'#DC2626')+';font-weight:700;">'+(c.type==='Cash In'||c.type==='Bank Receipt'?'+':'-')+inr(c.amount)+'</td><td><button class="btn btn-out btn-sm" onclick="editCashId='+c.id+';cashForm=true;document.getElementById(\'adminMain\').innerHTML=renderCashFlow();">✎</button> <button class="btn btn-red" onclick="deleteCash('+c.id+')">✕</button></td></tr>').join('');
  const tbl = '<div style="overflow-x:auto;"><table class="tbl" style="min-width:680px;"><thead><tr><th>Date</th><th>Type</th><th>Sub-Type</th><th>Description</th><th>Bank/Cash</th><th>Amount</th><th>Actions</th></tr></thead><tbody>'+rows+(rows?'':'<tr><td colspan="7" style="text-align:center;color:#94A3B8;padding:40px;">No entries yet.</td></tr>')+'</tbody></table></div>';

  return '<h1 style="font-size:22px;font-weight:800;color:#1E3A8A;margin-bottom:16px;">💵 Cash Flow</h1>'
    + summary + denomTable + bankTable
    + addBtn + (formHtml?formHtml+'<br/>':'')
    + '<div class="card" style="margin-top:4px;"><div style="font-size:14px;font-weight:800;color:#1E3A8A;margin-bottom:12px;">Cash Flow Transactions</div>'+tbl+'</div>';
}

function renderCashForm(){
  const cf = DB.get('cashflow')||[];
  const c = editCashId ? cf.find(x=>x.id===editCashId) : null;
  const isIncoming = !c || c.type==='Cash In' || c.type==='Bank Receipt';
  const subtypes = ['Customer Investment','Plot Sale','Loan Receipt','Interest Received','Other Income','Purchase Payment','Charge Payment','Salary Payment','Maintenance','Other Expense'];
  let denomHtml = DENOMS.map(d=>'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #EFF6FF;">'
    +'<span style="width:60px;font-weight:700;color:#1E3A8A;">₹'+d+'</span>'
    +'<span style="color:#64748B;font-size:12px;">×</span>'
    +'<input class="inp" id="den_'+d+'" type="number" min="0" value="'+(c&&c.denomination?c.denomination[d]||0:0)+'" style="width:80px;padding:6px;" onchange="updateDenomTotal()"/>'
    +'<span style="color:#16A34A;font-weight:700;font-size:13px;" id="dval_'+d+'">= '+inr((c&&c.denomination?c.denomination[d]||0:0)*d)+'</span>'
    +'</div>').join('');

  return '<div class="card" style="border-top:3px solid #16A34A;margin-bottom:14px;max-width:640px;">'
    +'<div style="font-size:16px;font-weight:800;color:#1E3A8A;margin-bottom:16px;">'+(editCashId?'Edit Entry':'New Cash Flow Entry')+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">'
    +'<div><label class="lbl">Date</label><input class="inp" id="cf_date" type="date" value="'+(c?c.date:'')+'"/></div>'
    +'<div><label class="lbl">Type</label><select class="inp" id="cf_type" onchange="toggleCfBank()">'
    +'<option '+(c&&c.type==="Cash In"?'selected':'')+' value="Cash In">Cash In</option>'
    +'<option '+(c&&c.type==="Cash Out"?'selected':'')+' value="Cash Out">Cash Out</option>'
    +'<option '+(c&&c.type==="Bank Receipt"?'selected':'')+' value="Bank Receipt">Bank Receipt</option>'
    +'<option '+(c&&c.type==="Bank Payment"?'selected':'')+' value="Bank Payment">Bank Payment</option>'
    +'</select></div>'
    +'<div><label class="lbl">Sub-Type</label><select class="inp" id="cf_sub">'
    +subtypes.map(s=>'<option '+(c&&c.subtype===s?'selected':'')+' value="'+s+'">'+s+'</option>').join('')
    +'</select></div>'
    +'<div><label class="lbl">Amount (₹)</label><input class="inp" id="cf_amt" type="number" value="'+(c?c.amount:'')+'" onchange="updateDenomTotal()"/></div>'
    +'<div style="grid-column:1/-1"><label class="lbl">Description</label><input class="inp" id="cf_desc" value="'+(c?c.description:'')+'"/></div>'
    +'<div id="cf_bank_wrap" style="grid-column:1/-1;'+(c&&(c.type==='Bank Receipt'||c.type==='Bank Payment')?'':'display:none;')+'"><label class="lbl">Bank Name</label><input class="inp" id="cf_bank" value="'+(c?c.bank:'')+'" placeholder="e.g. State Bank of India"/></div>'
    +'</div>'
    +'<div id="denom_section">'
    +'<div id="denom_header" style="font-size:12px;font-weight:800;color:#16A34A;margin-bottom:8px;">💵 Cash In — Denomination Breakdown</div>'
    + denomHtml
    +'<div style="display:flex;justify-content:space-between;margin-top:10px;padding:10px;background:#DCFCE7;border-radius:10px;"><span style="font-weight:800;">Denomination Total</span><span style="font-weight:800;color:#16A34A;" id="denom_grand">'+(()=>{ let t=0; DENOMS.forEach(d=>{ t+=(c&&c.denomination?c.denomination[d]||0:0)*d; }); return inr(t); })()+'</span></div>'
    +'</div>'
    +'<div style="display:flex;gap:10px;margin-top:14px;">'
    +'<button class="btn btn-blue" onclick="saveCashFlow()">💾 Save</button>'
    +'<button class="btn btn-out" onclick="cashForm=false;editCashId=null;document.getElementById(\'adminMain\').innerHTML=renderCashFlow();">Cancel</button>'
    +'</div></div>';
}

function toggleCfBank(){
  const t = document.getElementById('cf_type').value;
  const bw = document.getElementById('cf_bank_wrap');
  const ds = document.getElementById('denom_section');
  if(bw) bw.style.display = (t==='Bank Receipt'||t==='Bank Payment') ? '' : 'none';
  if(ds) ds.style.display = (t==='Cash In'||t==='Cash Out') ? '' : 'none';
  // update denomination header label
  const dh = document.getElementById('denom_header');
  if(dh) dh.textContent = '💵 ' + (t==='Cash Out'?'Cash Out':'Cash In') + ' — Denomination Breakdown';
}

function updateDenomTotal(){
  let total = 0;
  DENOMS.forEach(d=>{
    const cnt = parseInt(document.getElementById('den_'+d)?.value)||0;
    const val = cnt * d;
    total += val;
    const el = document.getElementById('dval_'+d);
    if(el) el.textContent = '= '+inr(val);
  });
  const gt = document.getElementById('denom_grand');
  if(gt) gt.textContent = inr(total);
}

function saveCashFlow(){
  const cf = DB.get('cashflow')||[];
  const type = document.getElementById('cf_type').value;
  const denom = {};
  if(type==='Cash In'||type==='Cash Out'){
    DENOMS.forEach(d=>{ denom[d]=parseInt(document.getElementById('den_'+d)?.value)||0; });
  }
  const entry = {
    id: editCashId||Date.now(),
    date: document.getElementById('cf_date').value,
    type: type,
    subtype: document.getElementById('cf_sub').value,
    description: document.getElementById('cf_desc').value.trim(),
    amount: parseFloat(document.getElementById('cf_amt').value)||0,
    bank: document.getElementById('cf_bank')?.value.trim()||'',
    denomination: denom
  };
  if(editCashId){ const idx=cf.findIndex(x=>x.id===editCashId); cf[idx]=entry; }
  else cf.push(entry);
  DB.set('cashflow',cf);
  cashForm=false; editCashId=null;
  document.getElementById('adminMain').innerHTML=renderCashFlow();
}
function deleteCash(id){ if(confirm('Delete this entry?')){ DB.set('cashflow',(DB.get('cashflow')||[]).filter(x=>x.id!==id)); document.getElementById('adminMain').innerHTML=renderCashFlow(); } }
